# ============================================================
# 都市文娱题材风格参数
# ============================================================

genre:
  name: "都市-文娱"
  sub_genres:
    - "华娱重生"     # 真实娱乐圈背景 + 重生金手指
    - "平行文娱"     # 架空世界 + 文抄公
    - "系统文娱"     # 系统任务驱动

# 金手指类型定义
golden_finger_types:
  rebirth:
    description: "重生回到过去，利用先知优势在娱乐圈发展"
    keywords: ["重生", "回到", "前世", "上一世", "再来一次"]
  system:
    description: "系统发布任务、提供奖励（歌曲/剧本/技能）"
    keywords: ["系统", "任务", "奖励", "兑换", "积分", "抽奖"]
  copycat:
    description: "将地球文艺作品搬运到平行世界"
    keywords: ["地球", "平行世界", "抄袭", "搬运", "前世记忆"]
  talent:
    description: "获得超强天赋（演技/唱功/导演能力等）"
    keywords: ["天赋", "觉醒", "能力", "传承"]

# 场景类型
scene_types:
  - id: "daily"
    name: "日常互动"
    description: "角色间的轻松日常、聊天、吃饭、聚会"
    keywords: ["吃饭", "聊天", "聚会", "逛街", "电话", "微信"]
  - id: "release"
    name: "作品发布"
    description: "歌曲上线/电影上映/专辑发布等作品面向公众的时刻"
    keywords: ["发布", "上线", "上映", "首映", "播出", "开播", "首发"]
  - id: "variety"
    name: "综艺录制"
    description: "综艺节目录制或播出场景"
    keywords: ["综艺", "节目", "录制", "播出", "舞台", "导师", "选手"]
  - id: "business"
    name: "商战谈判"
    description: "投资谈判、合同纠纷、公司经营、行业竞争"
    keywords: ["投资", "合同", "谈判", "收购", "股份", "董事会", "竞标"]
  - id: "romance"
    name: "感情戏"
    description: "恋爱互动、修罗场、感情抉择"
    keywords: ["表白", "牵手", "约会", "心动", "女友", "男友", "吃醋"]
  - id: "face_slapping"
    name: "打脸场面"
    description: "主角证明自己、打脸质疑者、逆袭反转"
    keywords: ["震惊", "打脸", "目瞪口呆", "难以置信", "不可能", "逆袭", "反转"]

# 叙事节奏标注
rhythm_labels:
  - id: "buildup"
    name: "铺垫章"
    description: "为后续高潮做准备的章节，推进剧情但未到爆发点"
  - id: "mini_climax"
    name: "小高潮章"
    description: "单元内的阶段性成果（一首歌火了/一场综艺录制成功）"
  - id: "major_climax"
    name: "大高潮章"
    description: "重大突破（票房大爆/获奖/行业地位跃升/感情里程碑）"
  - id: "transition"
    name: "过渡章"
    description: "两个单元之间的过渡，节奏放缓"
  - id: "resolution"
    name: "收尾章"
    description: "单元收尾，铺垫下一单元"

# 三线权重
three_lines:
  career:
    name: "事业线"
    keywords: ["拍摄", "票房", "排行榜", "收视率", "奖项", "投资", "签约", "发布", "出道"]
  romance:
    name: "感情线"
    keywords: ["女友", "心跳", "牵手", "约会", "暧昧", "拥抱", "表白", "吃醋", "喜欢"]
  daily:
    name: "日常线"
    keywords: ["吃饭", "睡觉", "聊天", "吐槽", "搞笑", "朋友圈", "微博", "直播"]

# 高潮检测关键词（辅助 LLM 判断）
climax_keywords:
  audience_reaction: ["震惊", "全场哗然", "掌声雷动", "目瞪口呆", "难以置信", "炸了", "爆了", "沸腾"]
  success_marker: ["逆袭", "奇迹", "破纪录", "登顶", "夺冠", "屠榜", "刷屏", "热搜第一"]
  face_slapping: ["打脸", "谁说", "当初", "现在", "打脸来得", "啪啪"]
  emotional: ["泪目", "感动", "热血", "燃", "起鸡皮疙瘩"]
